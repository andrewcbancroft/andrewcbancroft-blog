baseURL = "https://www.andrewcbancroft.com"
languageCode = "en-us"
title = "Andrew Bancroft"
description = 'Sharing bits of what I&#039;m learning one byte at a time.'
theme = "berbera"

pygmentsCodeFences=true
pygmentsUseClasses=true
pygmentsOptions="linenos=inline"
canonifyURLs=true
publishDir="docs"
disableKinds = ["section", "taxonomy", "taxonomyTerm"]

# Generate /robots.txt (template lives in the theme) so crawlers get an
# explicit allow + a Sitemap pointer. Without this Hugo emits no robots.txt
# and the path 404s.
enableRobotsTXT = true

# Use git commit dates for each page's Lastmod (Hugo's default lastmod
# resolution already prefers ":git"). This makes sitemap.xml <lastmod>
# reflect real modification history instead of only the original publish date.
enableGitInfo = true
disqusShortname="andrewcbancroft"

[markup.goldmark.renderer]
unsafe= true

[params]
author = "Andrew Bancroft"

# Newsletter signup configuration (provider-agnostic).
# The form partial (layouts/partials/newsletter-signup.html) reads everything
# from here so the ESP can be swapped without touching templates.
#
# provider = "stub" keeps the form in sandbox mode: no network submit, the
# GA4 newsletter_signup event still fires, and a success message renders.
# To go live with Buttondown:
#   provider = "buttondown"
#   action   = "https://buttondown.com/api/emails/embed-subscribe/<username>"
#   emailFieldName  = "email"
#   sourceFieldName = "tag"
# To go live with Kit (ConvertKit):
#   provider = "kit"
#   action   = "https://app.kit.com/forms/<form-id>/subscriptions"
#   emailFieldName  = "email_address"
#   sourceFieldName = "fields[source]"
[params.newsletter]
provider = "kit"
action = "https://app.kit.com/forms/9699642/subscriptions"
emailFieldName = "email_address"
sourceFieldName = "fields[source]"